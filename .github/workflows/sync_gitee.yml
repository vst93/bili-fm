name: sync to gitee

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-toolbelt

      - name: Sync GitHub Release to Gitee
        env:
          GITHUB_OWNER: vst93
          GITHUB_REPO: bili-fm
          GITEE_OWNER: vst93
          GITEE_REPO: bili-fm
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          MAX_WORKERS: '4'
        run: python .github/scripts/sync_gitee.py

      - name: Trigger Gitee repo mirror sync
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "Triggering Gitee mirror sync..."

          # Try multiple Gitee API endpoints
          for ENDPOINT in \
            "https://gitee.com/api/v5/repos/vst93/bili-fm/sync?access_token=${GITEE_TOKEN}" \
            "https://gitee.com/api/v5/repos/vst93/bili-fm/mirror/sync?access_token=${GITEE_TOKEN}"; do
            echo "Trying POST $ENDPOINT"
            HTTP_CODE=$(curl -s -o /tmp/resp_body -w "%{http_code}" -X POST "$ENDPOINT")
            echo "HTTP status: $HTTP_CODE"
            echo "Response: $(cat /tmp/resp_body)"
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Gitee mirror sync triggered successfully"
              exit 0
            fi

            echo "Trying PUT $ENDPOINT"
            HTTP_CODE=$(curl -s -o /tmp/resp_body -w "%{http_code}" -X PUT "$ENDPOINT")
            echo "HTTP status: $HTTP_CODE"
            echo "Response: $(cat /tmp/resp_body)"
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Gitee mirror sync triggered successfully"
              exit 0
            fi
          done

          echo "⚠ All Gitee mirror sync attempts failed"
