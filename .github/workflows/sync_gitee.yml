name: sync to gitee

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-toolbelt

      - name: Sync GitHub Release to Gitee
        env:
          GITHUB_OWNER: vst93
          GITHUB_REPO: bili-fm
          GITEE_OWNER: vst93
          GITEE_REPO: bili-fm
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          MAX_WORKERS: '4'
        run: python .github/scripts/sync_gitee.py

      - name: Push code to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "Pushing code to Gitee..."
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/vst93/bili-fm.git" 2>/dev/null || \
            git remote set-url gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/vst93/bili-fm.git"
          git push gitee main --force 2>&1 || echo "⚠ Push to Gitee failed"
          git remote remove gitee 2>/dev/null || true
          echo "✓ Code pushed to Gitee"
