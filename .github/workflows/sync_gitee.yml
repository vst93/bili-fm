name: sync to gitee

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-toolbelt

      - name: Sync GitHub Release to Gitee
        env:
          GITHUB_OWNER: vst93
          GITHUB_REPO: bili-fm
          GITEE_OWNER: vst93
          GITEE_REPO: bili-fm
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          MAX_WORKERS: '4'
        run: python .github/scripts/sync_gitee.py

      - name: Trigger Gitee repo mirror sync
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          python -c "
          import requests, sys
          url = 'https://gitee.com/api/v5/repos/vst93/bili-fm/sync'
          try:
              resp = requests.post(url, params={'access_token': __import__('os').environ['GITEE_TOKEN']}, timeout=30)
              print(f'HTTP status: {resp.status_code}')
              print(f'Response: {resp.text}')
              if 200 <= resp.status_code < 300:
                  print('✓ Gitee mirror sync triggered successfully')
              else:
                  print(f'⚠ Gitee mirror sync failed with {resp.status_code}')
          except Exception as e:
              print(f'⚠ Error: {e}')
              sys.exit(1)
          "
