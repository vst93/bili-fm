name: sync to gitee

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-toolbelt

      - name: Sync GitHub Release to Gitee
        env:
          GITHUB_OWNER: vst93
          GITHUB_REPO: bili-fm
          GITEE_OWNER: vst93
          GITEE_REPO: bili-fm
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          MAX_WORKERS: '4'
        run: python .github/scripts/sync_gitee.py

      - name: Trigger Gitee repo mirror sync
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          python -c "
          import requests, os, sys
          token = os.environ['GITEE_TOKEN']
          headers = {'Authorization': f'token {token}'}

          # Try Gitee sync API with different auth methods
          url = 'https://gitee.com/api/v5/repos/vst93/bili-fm/sync'
          methods = [
              ('query param', lambda: requests.post(url, params={'access_token': token}, timeout=30)),
              ('bearer header', lambda: requests.post(url, headers={'Authorization': f'Bearer {token}'}, timeout=30)),
              ('token header', lambda: requests.post(url, headers={'Authorization': f'token {token}'}, timeout=30)),
          ]
          for name, fn in methods:
              try:
                  resp = fn()
                  print(f'[{name}] HTTP {resp.status_code}: {resp.text[:200]}')
                  if 200 <= resp.status_code < 300:
                      print(f'✓ Gitee mirror sync triggered successfully ({name})')
                      sys.exit(0)
              except Exception as e:
                  print(f'[{name}] Error: {e}')

          print('⚠ Gitee sync API not available (repo may not be a Gitee mirror)')
          print('⚠ Code sync may need manual trigger via Gitee web UI')
          "
