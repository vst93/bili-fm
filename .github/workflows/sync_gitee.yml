name: sync to gitee

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-toolbelt

      - name: Sync GitHub Release to Gitee
        env:
          GITHUB_OWNER: vst93
          GITHUB_REPO: bili-fm
          GITEE_OWNER: vst93
          GITEE_REPO: bili-fm
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          MAX_WORKERS: '4'
        run: python .github/scripts/sync_gitee.py

      - name: Trigger Gitee repo mirror sync
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "Triggering Gitee mirror sync..."

          # Gitee mirror sync API - try form-encoded POST
          HTTP_CODE=$(curl -s -o /tmp/resp_body -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "access_token=${GITEE_TOKEN}" \
            "https://gitee.com/api/v5/repos/vst93/bili-fm/sync")
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $(cat /tmp/resp_body)"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ Gitee mirror sync triggered successfully"
          else
            echo "⚠ Gitee mirror sync API returned $HTTP_CODE, trying alternative..."
            # Alternative: use private_token header
            HTTP_CODE=$(curl -s -o /tmp/resp_body -w "%{http_code}" \
              -X POST \
              -H "private_token: ${GITEE_TOKEN}" \
              "https://gitee.com/api/v5/repos/vst93/bili-fm/sync")
            echo "HTTP status (header auth): $HTTP_CODE"
            echo "Response: $(cat /tmp/resp_body)"
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Gitee mirror sync triggered successfully"
            else
              echo "⚠ Gitee mirror sync failed, code sync may need manual trigger"
            fi
          fi
