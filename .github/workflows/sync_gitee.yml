name: sync to gitee

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests requests-toolbelt

      - name: Sync GitHub Release to Gitee
        env:
          GITHUB_OWNER: vst93
          GITHUB_REPO: bili-fm
          GITEE_OWNER: vst93
          GITEE_REPO: bili-fm
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          MAX_WORKERS: '4'
        run: python .github/scripts/sync_gitee.py

      - name: Trigger Gitee repo mirror sync
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "Triggering Gitee mirror sync..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://gitee.com/api/v5/repos/vst93/bili-fm/sync" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\": \"${GITEE_TOKEN}\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ Gitee mirror sync triggered successfully"
          else
            echo "⚠ Gitee mirror sync failed (may already be syncing or rate limited)"
          fi
